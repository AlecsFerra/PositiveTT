name: Lean Action CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - uses: leanprover/lean-action@v1
        with:
          auto-config: false
      - name: Check SPos.lean
        run: lake env lean SPos.lean
      - name: Lint SPos
        run: lake lint SPos
